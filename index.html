<!DOCTYPE html>
<html lang="pl">
<head>
    <link rel="icon" href="Nowy projekt (46).png" type="image/png">
    <meta charset="UTF-8">
    <title>cmentarzcmentarzcmentarz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* ---- fade-in przy wejściu ---- */
        body {
            opacity: 0;
            transition: opacity 0.5s;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        body.fade-in {
            opacity: 1;
        }

        .container {
            width: 100%;
            max-width: 900px;
            text-align: center;
            padding: 40px 20px;
        }

        /* LOGO */
        .logo {
            margin-bottom: 50px;
        }

        .logo img {
            max-width: 220px;
            height: auto;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.08));
        }

        /* LINKI */
        .links {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px; /* odstępy między kolumnami i wierszami */
        }

        .links > a:last-child {
            grid-column: 1 / -1; /* ostatni link rozciąga się na całą szerokość */
        }

        .link-box {
            padding: 25px;
            border-radius: 18px;
            border: 1px solid #2a2a2a;
            background: #141414;
            transition: 0.3s ease;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .link-box:hover {
            background: #1f1f1f;
            border-color: #444;
            transform: translateY(-4px);
            box-shadow: 0 0 25px rgba(0,0,0,0.7);
        }

        a {
            text-decoration: none;
            color: #e0e0e0;
            font-weight: bold;
            letter-spacing: 1px;
            display: block; /* cała zawartość linka klikalna */
        }

        a:hover {
            color: #ffffff;
        }

        /* PRZYCISK POWROTU */
        #back-home {
            margin-top: 30px;
            padding: 15px 30px;
            border-radius: 12px;
            background-color: #141414;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 18px;
        }

        #back-home:hover {
            background-color: #1f1f1f;
            border-color: #444;
        }

        @media (max-width: 700px) {
            .links {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- LOGO -->
    <div class="logo">
        <img src="Untitled-2 (2).png" alt="Logo">
    </div>

    <!-- LINKI -->
    <div class="links">
        <a href="bojesieokien.html" class="fade-link">
            <div class="link-box">bojesieokien</div>
        </a>

        <a href="krystaltears.html" class="fade-link">
            <div class="link-box">krystaltears</div>
        </a>

        <a href="xxigil.html" target="_blank" class="fade-link">
            <div class="link-box">xxigil</div>
        </a>

        <a href="syrupsaint.html" target="_blank" class="fade-link">
            <div class="link-box">syrupsaint</div>
        </a>

        <a href="okae.html" target="_blank" class="fade-link">
            <div class="link-box">okae</div>
        </a>
    </div>

    <!-- PRZYCISK POWROTU -->
    <button id="back-home">Powrót na stronę główną</button>

</div>

<script>
    // fade-in przy wejściu
    window.addEventListener('DOMContentLoaded', () => {
        document.body.classList.add('fade-in');
    });

    // fade-out przy kliknięciu linka na cały box
    document.querySelectorAll('.fade-link').forEach(link => {
        link.addEventListener('click', function(e){
            e.preventDefault(); 
            document.body.style.opacity = 0; 
            setTimeout(() => {
                window.location.href = this.href;
            }, 500);
        });
    });

    // PRZYCISK POWROTU z fade-out
    document.getElementById('back-home').addEventListener('click', () => {
        document.body.style.opacity = 0; // fade-out
        setTimeout(() => {
            window.location.href = "index.html"; // strona główna
        }, 500);
    });
</script>

</body>
</html>
