<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>cmentarzcmentarzcmentarz</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            opacity: 1;
            transition: opacity 0.5s;
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 40px 20px;
            background-color: rgba(30, 30, 30, 0.8);
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 15px auto;
            object-fit: cover;
            border: 3px solid #ffffff;
        }

        .nickname {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .link-box a {
            color: #e0e0e0;
            text-decoration: none;
            font-size: 22px;
            transition: color 0.2s;
            display: block; /* cała powierzchnia klikalna */
        }

        .link-box a:hover {
            color: #ff3e00;
        }

        /* Przycisk powrotu */
        #back-home {
            margin-top: 30px;
            padding: 12px 25px;
            border-radius: 12px;
            background-color: #141414;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 20px;
        }

        #back-home:hover {
            background-color: #1f1f1f;
            border-color: #444;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Avatar -->
        <img src="avatars-kVJk4c06Ujsu5Yo0-jLh6ow-t500x500.jpg" alt="Avatar" class="avatar">
        
        <!-- Nick -->
        <div class="nickname">bojesieokien</div>

        <!-- Linki -->
        <div class="links">
            <div class="link-box">
                <a href="https://www.instagram.com/bojesieokien/" class="fade-link">instagram</a>
            </div>
            <div class="link-box">
                <a href="https://soundcloud.com/pdw666" class="fade-link">soundcloud</a>
            </div>
        </div>

        <!-- Przycisk powrotu na główną -->
        <button id="back-home">powrot</button>
    </div>

    <script>
        // fade-out przy kliknięciu linków
        document.querySelectorAll('.fade-link').forEach(link => {
            link.addEventListener('click', function(e){
                e.preventDefault();
                document.body.style.opacity = 0;
                setTimeout(() => {
                    window.location.href = this.href;
                }, 500);
            });
        });

        // fade-out przy kliknięciu przycisku powrotu
        document.getElementById('back-home').addEventListener('click', () => {
            document.body.style.opacity = 0;
            setTimeout(() => {
                window.location.href = "index.html";
            }, 500);
        });
    </script>
</body>
</html>
